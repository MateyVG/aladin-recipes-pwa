# Netlify configuration file for React + Vite PWA

[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    NODE_VERSION = "22"

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Глобални security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

# index.html — НИКОГА не се кешира (браузърът винаги взима новия)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# service-worker.js — НИКОГА не се кешира (критично!)
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache, no-store, must-revalidate"

# manifest.json — кратък кеш
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

# Статични assets с хеш в името — кешират се 1 година
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PWA икони
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"